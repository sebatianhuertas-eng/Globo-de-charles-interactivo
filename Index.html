<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Globo Interactivo</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;
    background:#f0f4f9;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    color:#1d3557;
}

.controls{
    margin-top:20px;
}

input[type=range]{
    width:80%;
}

.balloon-area{
    height:350px;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    margin-top:30px;
}

.balloon{
    width:120px;
    height:150px;
    background:#ff4d6d;
    border-radius:50%;
    position:relative;
    transition:0.4s;
}

.balloon::after{
    content:"";
    width:2px;
    height:100px;
    background:black;
    position:absolute;
    left:50%;
    top:150px;
}

.result{
    font-size:22px;
    margin-top:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Ley de Charles</h1>

<p>
Cuando la temperatura aumenta, el volumen del gas también aumenta.
</p>

<h2>V₁/T₁ = V₂/T₂</h2>

<div class="controls">

<p>
Volumen inicial V₁:
<br>
<input type="range" id="v1" min="1" max="10" step="0.1" value="5">
<br>
<span id="v1Text">5</span> L
</p>

<p>
Temperatura inicial T₁:
<br>
<input type="range" id="t1" min="100" max="500" value="300">
<br>
<span id="t1Text">300</span> K
</p>

<p>
Temperatura final T₂:
<br>
<input type="range" id="t2" min="100" max="500" value="400">
<br>
<span id="t2Text">400</span> K
</p>

</div>

<div class="result">
V₂ = <span id="v2Text"></span> L
</div>

<div class="balloon-area">
    <div class="balloon" id="balloon"></div>
</div>

</div>

<script>

const v1 = document.getElementById("v1");
const t1 = document.getElementById("t1");
const t2 = document.getElementById("t2");

function actualizar(){

    let V1 = parseFloat(v1.value);
    let T1 = parseFloat(t1.value);
    let T2 = parseFloat(t2.value);

    let V2 = (V1*T2)/T1;

    document.getElementById("v1Text").innerText = V1;
    document.getElementById("t1Text").innerText = T1;
    document.getElementById("t2Text").innerText = T2;

    document.getElementById("v2Text").innerText = V2.toFixed(2);

    let escala = V2 / 5;

    document.getElementById("balloon").style.transform =
        "scale(" + escala + ")";
}

v1.oninput = actualizar;
t1.oninput = actualizar;
t2.oninput = actualizar;

actualizar();

</script>

</body>
</html>
</html>
